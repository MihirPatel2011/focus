<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Focus</title>
    <!--
      GitHub Pages SPA fallback (rafgraph/spa-github-pages technique).
      GitHub Pages has no server-side rewrite, so deep links / refreshes hit a
      404. This page encodes the requested path into a query string and
      redirects to the app root, where a snippet in index.html restores it.
      pathSegmentsToKeep = 1 keeps the "/focus/" project-site base path.
    -->
    <script>
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
