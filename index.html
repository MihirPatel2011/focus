<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="Focus — personal productivity & time-tracking." />
    <title>Focus</title>
    <script>
      window.addEventListener("error", function (e) {
        var d = document.createElement("pre");
        d.style.cssText =
          "position:fixed;inset:0;z-index:99999;margin:0;padding:16px;white-space:pre-wrap;font:13px monospace;background:#fff;color:#b00;overflow:auto";
        d.textContent =
          "JS ERROR: " + (e.error && e.error.stack ? e.error.stack : e.message);
        document.documentElement.appendChild(d);
      });
    </script>
    <!-- Restore the deep-link path encoded by 404.html (GitHub Pages SPA fallback). -->
    <script>
      (function () {
        var l = window.location;
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
